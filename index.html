<link rel="stylesheet" href="index.css">
<!-- <script src="md-page.js"></script> -->



<noscript id="fallback">
</noscript>

<script>
    let mdFile = document.createElement('script');
    mdFile.type = 'text/plain';
    mdFile.src = './README.md';
    document.body.appendChild(mdFile);

    mdFile.onload = function() {
        document.getElementById('fallback').innerHTML = this.responseText;
    };
</script>

<script>
    document.getElementById('lightModeBtn').addEventListener('click', function() {
        document.body.classList.remove('dark-mode');
        document.body.classList.add('light-mode');
    });

    document.getElementById('darkModeBtn').addEventListener('click', function() {
        document.body.classList.remove('light-mode');
        document.body.classList.add('dark-mode');
    });
</script>
