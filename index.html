<link rel="stylesheet" href="index.css">
<script src="md-page.js"></script>



<noscript id="fallback">
  <%= new File('README.md').text %>
</noscript>

<script>
  document.getElementById('fallback').innerHTML = document.querySelector('script[src="README.md"]').innerHTML;
  document.getElementById('fallback').removeAttribute('id');
</script>

<script>
    document.getElementById('lightModeBtn').addEventListener('click', function() {
        document.body.classList.remove('dark-mode');
        document.body.classList.add('light-mode');
    });

    document.getElementById('darkModeBtn').addEventListener('click', function() {
        document.body.classList.remove('light-mode');
        document.body.classList.add('dark-mode');
    });
</script>
