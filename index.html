<link rel="stylesheet" href="index.css">

<noscript id="main_page">
</noscript>

<!-- Load the markdown file -->

<script>
    fetch('README.md')
        .then(response => response.text())
        .then(text => {
            // Split text by newlines
            const lines = text.split('\n');
            const mainPageElement = document.getElementById('main_page');

            // Loop through lines and add each as a separate text node
            lines.forEach((line, index) => {
                // Create a text node for each line
                var textNode = document.createTextNode(line);
                
                // Add blank line for empty lines
                if (line.length == 0) {
                    textNode = document.createTextNode('\n');
                }
                // Append the text node to the main_page element
                mainPageElement.appendChild(textNode);

                // Add a newline after each line, except the last one
                // if (index < lines.length - 1) {
                //     mainPageElement.appendChild(document.createElement('br'));
                // }
            });
        })
        .catch(error => console.error('Error:', error));
</script>

<!-- Load the script and interpret markdown-->
<script src="md-page.js"></script>
