<link rel="stylesheet" href="index.css">
<script src="md-page.js"></script>



<noscript id="main_page">
    <title>Index Page</title>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        <div class="theme-btns">
            <button id="lightModeBtn" class="theme-btn">Light Mode</button>
            <button id="darkModeBtn" class="theme-btn">Dark Mode</button>
        </div>
    </nav>
</noscript>

<script>
    fetch('README.md')
        .then(response => response.text())
        .then(text => document.getElementById('main_page').textContent += text)
        .catch(error => console.error('Error:', error));
</script>

<script>
    document.getElementById('lightModeBtn').addEventListener('click', function() {
        document.body.classList.remove('dark-mode');
        document.body.classList.add('light-mode');
    });

    document.getElementById('darkModeBtn').addEventListener('click', function() {
        document.body.classList.remove('light-mode');
        document.body.classList.add('dark-mode');
    });
</script>
