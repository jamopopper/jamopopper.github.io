<link rel="stylesheet" href="index.css">
<!-- <script src="md-page.js"></script> -->



<noscript id="fallback">
</noscript>

<script>
  const script = document.querySelector('script[src="README.md"]');
  if (script) {
    const fallback = document.getElementById('fallback');
    if (fallback) {
      fallback.innerHTML = script.innerHTML;
      fallback.removeAttribute('id');
    }
  }
</script>

<script>
    document.getElementById('lightModeBtn').addEventListener('click', function() {
        document.body.classList.remove('dark-mode');
        document.body.classList.add('light-mode');
    });

    document.getElementById('darkModeBtn').addEventListener('click', function() {
        document.body.classList.remove('light-mode');
        document.body.classList.add('dark-mode');
    });
</script>
